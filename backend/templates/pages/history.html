<div style="flex:1;overflow-y:auto;background:#060608;padding:32px 40px;" class="fade-up">
  <div style="max-width:800px;margin:0 auto;">

    <!-- Header -->
    <div style="margin-bottom:24px;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">
        <div style="width:28px;height:28px;border-radius:8px;background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.2);display:flex;align-items:center;justify-content:center;">
          <svg width="13" height="13" fill="none" stroke="#818cf8" viewBox="0 0 24 24" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
        </div>
        <h1 style="font-size:20px;font-weight:650;color:#f0f0f0;letter-spacing:-0.03em;">History</h1>
      </div>
      <p style="font-size:13px;color:#3e3e42;line-height:1.6;padding-left:38px;">Query history and document ingestion log.</p>
    </div>

    <!-- Tabs + panels -->
    <div x-data="{ tab: 'queries' }">

      <!-- Tab bar -->
      <div style="display:inline-flex;gap:2px;padding:3px;background:#0e0e10;border:1px solid #1e1e22;border-radius:9px;margin-bottom:20px;">
        <button @click="tab='queries'"
          style="padding:6px 16px;border-radius:7px;font-size:12.5px;font-weight:500;border:none;cursor:pointer;font-family:inherit;transition:all 0.15s;letter-spacing:-0.01em;"
          :style="tab==='queries' ? 'background:#1a1a1e;color:#e0e0e4;box-shadow:0 1px 4px rgba(0,0,0,0.5);' : 'background:transparent;color:#3e3e42;'">
          Queries
        </button>
        <button @click="tab='ingestions'"
          style="padding:6px 16px;border-radius:7px;font-size:12.5px;font-weight:500;border:none;cursor:pointer;font-family:inherit;transition:all 0.15s;letter-spacing:-0.01em;"
          :style="tab==='ingestions' ? 'background:#1a1a1e;color:#e0e0e4;box-shadow:0 1px 4px rgba(0,0,0,0.5);' : 'background:transparent;color:#3e3e42;'">
          Ingestions
        </button>
      </div>

      <!-- Queries panel -->
      <div x-show="tab==='queries'" x-cloak
           id="queries-panel"
           hx-get="/ui/history/queries" hx-trigger="load" hx-swap="innerHTML">
        <div style="display:flex;flex-direction:column;gap:6px;">
          <div class="skeleton" style="height:70px;border-radius:11px;"></div>
          <div class="skeleton" style="height:70px;border-radius:11px;opacity:0.7;"></div>
          <div class="skeleton" style="height:70px;border-radius:11px;opacity:0.5;"></div>
        </div>
      </div>

      <!-- Ingestions panel -->
      <div x-show="tab==='ingestions'" x-cloak
           id="ingestions-panel"
           hx-get="/ui/history/ingestions" hx-trigger="load" hx-swap="innerHTML">
        <div style="display:flex;flex-direction:column;gap:6px;">
          <div class="skeleton" style="height:58px;border-radius:11px;"></div>
          <div class="skeleton" style="height:58px;border-radius:11px;opacity:0.7;"></div>
          <div class="skeleton" style="height:58px;border-radius:11px;opacity:0.5;"></div>
        </div>
      </div>

    </div>
  </div>
</div>
