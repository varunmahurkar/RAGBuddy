<div style="display:flex;flex:1;overflow:hidden;background:#060608;" class="fade-up">

  <!-- ══ Category sidebar ═══════════════════════════════════════════════════ -->
  <div style="width:210px;flex-shrink:0;border-right:1px solid #1e1e22;overflow-y:auto;padding:14px 10px;background:#0c0c0e;">
    <div style="font-size:9.5px;font-weight:600;color:#2e2e32;text-transform:uppercase;letter-spacing:0.1em;padding:0 6px;margin-bottom:10px;">Categories</div>

    <!-- All articles link -->
    <a href="#"
       hx-get="/ui/kb/articles" hx-target="#articles-panel" hx-swap="innerHTML" hx-indicator="#art-spinner"
       style="display:flex;align-items:center;gap:7px;padding:6px 9px;border-radius:7px;font-size:12.5px;color:#4a4a4e;text-decoration:none;transition:all 0.12s;margin-bottom:4px;"
       onmouseover="this.style.background='rgba(255,255,255,0.03)';this.style.color='#c0c0c4';"
       onmouseout="this.style.background='transparent';this.style.color='#4a4a4e';">
      <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" style="opacity:0.6;">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 10h16M4 14h16M4 18h16"/>
      </svg>
      All Articles
    </a>

    <!-- Category tree (HTMX loaded) -->
    <div id="category-tree" hx-get="/ui/kb/categories" hx-trigger="load" hx-swap="innerHTML">
      <div style="padding:4px 6px;display:flex;flex-direction:column;gap:7px;margin-top:4px;">
        <div class="skeleton" style="height:9px;width:80%;border-radius:4px;"></div>
        <div class="skeleton" style="height:9px;width:64%;margin-left:12px;border-radius:4px;"></div>
        <div class="skeleton" style="height:9px;width:72%;border-radius:4px;"></div>
        <div class="skeleton" style="height:9px;width:52%;margin-left:12px;border-radius:4px;"></div>
      </div>
    </div>
  </div>

  <!-- ══ Articles list ══════════════════════════════════════════════════════ -->
  <div style="width:268px;flex-shrink:0;border-right:1px solid #1e1e22;display:flex;flex-direction:column;background:#0e0e12;">

    <!-- Search bar -->
    <div style="padding:11px;border-bottom:1px solid #141416;flex-shrink:0;">
      <div style="position:relative;">
        <svg width="12" height="12" fill="none" stroke="#383838" viewBox="0 0 24 24" stroke-width="2"
             style="position:absolute;left:9px;top:50%;transform:translateY(-50%);pointer-events:none;">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
        <input type="search" name="search" placeholder="Search articles…"
               hx-get="/ui/kb/articles" hx-trigger="input changed delay:300ms, search"
               hx-target="#articles-panel" hx-swap="innerHTML" hx-indicator="#art-spinner"
               class="input"
               style="width:100%;padding:8px 10px 8px 28px;font-size:12.5px;">
      </div>
      <div id="art-spinner" class="htmx-indicator" style="display:flex;align-items:center;gap:5px;margin-top:6px;padding:0 2px;">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" style="animation:spin 0.8s linear infinite;">
          <circle cx="12" cy="12" r="10" stroke="rgba(99,102,241,0.2)" stroke-width="3"/>
          <path d="M4 12a8 8 0 018-8" stroke="#6366f1" stroke-width="3" stroke-linecap="round"/>
        </svg>
        <span style="font-size:11px;color:#383838;">Loading…</span>
      </div>
    </div>

    <!-- Articles panel (HTMX target) -->
    <div id="articles-panel" style="flex:1;overflow-y:auto;"
         hx-get="/ui/kb/articles" hx-trigger="load" hx-swap="innerHTML">
      <div style="padding:10px;display:flex;flex-direction:column;gap:5px;">
        <div class="skeleton" style="height:50px;border-radius:8px;"></div>
        <div class="skeleton" style="height:50px;border-radius:8px;opacity:0.7;"></div>
        <div class="skeleton" style="height:50px;border-radius:8px;opacity:0.5;"></div>
        <div class="skeleton" style="height:50px;border-radius:8px;opacity:0.35;"></div>
      </div>
    </div>
  </div>

  <!-- ══ Article detail ════════════════════════════════════════════════════ -->
  <div id="article-detail" style="flex:1;overflow-y:auto;padding:36px 44px;min-width:0;">
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;">
      <div style="width:52px;height:52px;border-radius:14px;background:#0e0e10;border:1px solid #1e1e22;display:flex;align-items:center;justify-content:center;margin-bottom:12px;">
        <svg width="20" height="20" fill="none" stroke="#252528" viewBox="0 0 24 24" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
      </div>
      <p style="font-size:13px;color:#2e2e32;font-weight:500;">Select an article to read</p>
      <p style="font-size:12px;color:#222224;margin-top:4px;">Browse categories or search on the left</p>
    </div>
  </div>

</div>

<style>@keyframes spin { to { transform: rotate(360deg); } }</style>

<script>
(function(){
  const p = new URLSearchParams(location.search);
  const art = p.get('article');
  if (art) {
    htmx.ajax('GET', '/ui/kb/article/' + encodeURIComponent(art), {
      target: '#article-detail', swap: 'innerHTML'
    });
  }
})();
</script>
