<div x-data="uploadApp()" x-init="loadDocs()" style="flex:1;overflow-y:auto;background:#060608;padding:32px 40px;" class="fade-up">
  <div style="max-width:700px;margin:0 auto;">

    <!-- Page header -->
    <div style="margin-bottom:28px;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">
        <div style="width:28px;height:28px;border-radius:8px;background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.2);display:flex;align-items:center;justify-content:center;">
          <svg width="13" height="13" fill="none" stroke="#818cf8" viewBox="0 0 24 24" stroke-width="2.2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
          </svg>
        </div>
        <h1 style="font-size:20px;font-weight:650;color:#f0f0f0;letter-spacing:-0.03em;">Upload Documents</h1>
      </div>
      <p style="font-size:13px;color:#3e3e42;line-height:1.6;padding-left:38px;">Drop your files below. RAGBuddy will parse and index them into searchable knowledge base articles.</p>
    </div>

    <!-- Drop zone -->
    <div
      @dragover.prevent="dragging=true"
      @dragleave.prevent="dragging=false"
      @drop.prevent="handleDrop($event)"
      @click="$refs.fileInput.click()"
      style="border-radius:14px;padding:44px 32px;text-align:center;cursor:pointer;transition:all 0.2s;margin-bottom:24px;position:relative;overflow:hidden;"
      :style="dragging
        ? 'border:1.5px solid #6366f1;background:rgba(99,102,241,0.05);box-shadow:0 0 0 5px rgba(99,102,241,0.05),inset 0 0 40px rgba(99,102,241,0.03);'
        : 'border:1.5px dashed #343438;background:#0a0a0c;'">

      <input type="file" x-ref="fileInput" multiple accept=".pdf,.docx,.txt,.md"
             @change="handleFiles($event.target.files)" style="display:none;">

      <div style="pointer-events:none;">
        <div style="width:48px;height:48px;border-radius:12px;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;"
             :style="dragging ? 'background:rgba(99,102,241,0.15);border:1px solid rgba(99,102,241,0.3);' : 'background:#111113;border:1px solid #222224;'">
          <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8"
               :style="dragging ? 'color:#a5b4fc;' : 'color:#444448;'">
            <path stroke-linecap="round" stroke-linejoin="round" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
          </svg>
        </div>
        <p style="font-size:14px;font-weight:500;margin-bottom:5px;transition:color 0.2s;"
           :style="dragging ? 'color:#a5b4fc;' : 'color:#c0c0c4;'">
          <span x-show="!dragging">Drop files here or <span style="color:#818cf8;text-decoration:underline;text-underline-offset:3px;">browse</span></span>
          <span x-show="dragging">Release to upload</span>
        </p>
        <p style="font-size:11.5px;color:#2e2e32;margin-top:4px;">PDF, DOCX, TXT, Markdown &mdash; up to 50 MB each</p>
      </div>
    </div>

    <!-- Upload Queue -->
    <div x-show="queue.length>0" x-cloak style="margin-bottom:24px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
        <div style="font-size:10px;font-weight:600;color:#333336;text-transform:uppercase;letter-spacing:0.09em;">Queue &mdash; <span x-text="queue.length"></span> file<span x-show="queue.length!==1">s</span></div>
        <button @click="uploadAll()" :disabled="uploading" class="btn btn-primary" style="padding:6px 14px;font-size:12px;"
          :style="uploading ? 'opacity:0.4;cursor:not-allowed;' : ''">
          <svg x-show="uploading" width="11" height="11" fill="none" viewBox="0 0 24 24" style="animation:spin 0.8s linear infinite;">
            <circle cx="12" cy="12" r="10" stroke="rgba(255,255,255,0.2)" stroke-width="3"/>
            <path d="M4 12a8 8 0 018-8" stroke="white" stroke-width="3" stroke-linecap="round"/>
          </svg>
          <span x-text="uploading ? 'Uploading…' : 'Upload All'"></span>
        </button>
      </div>
      <div style="display:flex;flex-direction:column;gap:5px;">
        <template x-for="(item,idx) in queue" :key="idx">
          <div style="display:flex;align-items:center;gap:12px;padding:11px 13px;background:#0e0e10;border:1px solid #1e1e22;border-radius:10px;">
            <div style="width:32px;height:32px;border-radius:8px;background:#111113;border:1px solid #222224;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
              <span style="font-size:8.5px;font-weight:700;text-transform:uppercase;" :style="extColor(item.name)" x-text="item.name.split('.').pop()"></span>
            </div>
            <div style="flex:1;min-width:0;">
              <div style="font-size:13px;color:#d0d0d4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:450;letter-spacing:-0.01em;" x-text="item.name"></div>
              <div style="font-size:11px;color:#3a3a3e;margin-top:2px;" x-text="formatSize(item.size)"></div>
            </div>
            <div style="flex-shrink:0;display:flex;align-items:center;gap:5px;">
              <span x-show="item.status==='pending'" style="font-size:11px;color:#3a3a3e;font-weight:500;">Pending</span>
              <span x-show="item.status==='uploading'" style="font-size:11px;color:#818cf8;display:flex;align-items:center;gap:4px;">
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" style="animation:spin 0.8s linear infinite;">
                  <circle cx="12" cy="12" r="10" stroke="rgba(129,140,248,0.25)" stroke-width="3"/>
                  <path d="M4 12a8 8 0 018-8" stroke="#818cf8" stroke-width="3" stroke-linecap="round"/>
                </svg>
                Uploading
              </span>
              <span x-show="item.status==='done'" style="font-size:11px;color:#34d399;font-weight:500;">✓ Done</span>
              <span x-show="item.status==='error'" style="font-size:11px;color:#f87171;font-weight:500;">✗ Error</span>
            </div>
            <button @click="queue.splice(idx,1)"
              style="color:#2a2a2e;background:none;border:none;cursor:pointer;padding:3px;line-height:0;transition:color 0.15s;flex-shrink:0;"
              onmouseover="this.style.color='#888'" onmouseout="this.style.color='#2a2a2e'">
              <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
              </svg>
            </button>
          </div>
        </template>
      </div>
    </div>

    <!-- Indexed documents -->
    <div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
        <div style="font-size:10px;font-weight:600;color:#333336;text-transform:uppercase;letter-spacing:0.09em;">Indexed Documents</div>
        <button @click="loadDocs()"
          style="font-size:11.5px;color:#3a3a3e;background:none;border:none;cursor:pointer;font-family:inherit;transition:color 0.15s;display:flex;align-items:center;gap:4px;"
          onmouseover="this.style.color='#818cf8'" onmouseout="this.style.color='#3a3a3e'">
          <svg width="11" height="11" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
          </svg>
          Refresh
        </button>
      </div>

      <!-- Skeletons -->
      <div x-show="docsLoading" style="display:flex;flex-direction:column;gap:5px;">
        <div class="skeleton" style="height:60px;border-radius:10px;"></div>
        <div class="skeleton" style="height:60px;border-radius:10px;opacity:0.7;"></div>
        <div class="skeleton" style="height:60px;border-radius:10px;opacity:0.5;"></div>
      </div>

      <!-- Empty state -->
      <div x-show="!docsLoading && docs.length===0"
        style="text-align:center;padding:52px 20px;border:1.5px dashed #1a1a1c;border-radius:14px;background:#09090b;">
        <div style="width:42px;height:42px;border-radius:12px;background:#111113;border:1px solid #1e1e22;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;">
          <svg width="18" height="18" fill="none" stroke="#2e2e32" viewBox="0 0 24 24" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 13h6m-3-3v6m5 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
          </svg>
        </div>
        <p style="font-size:13px;color:#333336;font-weight:500;">No documents yet</p>
        <p style="font-size:12px;color:#252528;margin-top:4px;">Drop files above to get started</p>
      </div>

      <!-- Document cards -->
      <div x-show="!docsLoading && docs.length>0" style="display:flex;flex-direction:column;gap:5px;">
        <template x-for="doc in docs" :key="doc.name">
          <div style="display:flex;align-items:center;gap:13px;padding:13px 15px;background:#0e0e10;border:1px solid #1e1e22;border-radius:11px;transition:border-color 0.15s;"
               onmouseover="this.style.borderColor='#2a2a2e'" onmouseout="this.style.borderColor='#1e1e22'">
            <div style="width:36px;height:36px;border-radius:9px;background:#111113;border:1px solid #222224;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
              <span style="font-size:9.5px;font-weight:700;text-transform:uppercase;" :style="extColor(doc.name)" x-text="(doc.extension||'').replace('.','')||'?'"></span>
            </div>
            <div style="flex:1;min-width:0;">
              <div style="font-size:13.5px;font-weight:500;color:#d4d4d8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-0.01em;" x-text="doc.name"></div>
              <div style="display:flex;align-items:center;gap:10px;margin-top:3px;">
                <span style="font-size:11px;color:#383838;" x-text="formatSize(doc.size)"></span>
                <span x-show="doc.uploaded_at" style="font-size:11px;color:#2e2e32;" x-text="formatDate(doc.uploaded_at)"></span>
              </div>
            </div>
            <div style="flex-shrink:0;margin-right:4px;">
              <span x-show="!doc.ingesting && !doc.ingested && !doc.ingestError"
                style="font-size:11px;color:#3a3a3e;background:#111113;border:1px solid #1e1e22;padding:3px 10px;border-radius:20px;font-weight:500;">Ready</span>
              <span x-show="doc.ingesting"
                style="font-size:11px;color:#818cf8;background:rgba(99,102,241,0.08);border:1px solid rgba(99,102,241,0.15);padding:3px 10px;border-radius:20px;display:inline-flex;align-items:center;gap:5px;">
                <svg width="9" height="9" viewBox="0 0 24 24" fill="none" style="animation:spin 0.8s linear infinite;">
                  <circle cx="12" cy="12" r="10" stroke="rgba(129,140,248,0.25)" stroke-width="3"/>
                  <path d="M4 12a8 8 0 018-8" stroke="#818cf8" stroke-width="3" stroke-linecap="round"/>
                </svg>
                Ingesting
              </span>
              <span x-show="doc.ingested"
                style="font-size:11px;color:#34d399;background:rgba(52,211,153,0.08);border:1px solid rgba(52,211,153,0.15);padding:3px 10px;border-radius:20px;font-weight:500;">✓ Indexed</span>
              <span x-show="doc.ingestError"
                style="font-size:11px;color:#f87171;background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.15);padding:3px 10px;border-radius:20px;font-weight:500;">✗ Failed</span>
            </div>
            <button x-show="!doc.ingested" @click="ingest(doc)" :disabled="doc.ingesting"
              style="flex-shrink:0;padding:6px 13px;border-radius:7px;font-size:12px;font-weight:500;border:1px solid rgba(99,102,241,0.25);color:#818cf8;background:rgba(99,102,241,0.06);cursor:pointer;transition:all 0.15s;font-family:inherit;letter-spacing:-0.01em;"
              :style="doc.ingesting ? 'opacity:0.35;cursor:not-allowed;' : ''"
              onmouseover="if(!this.disabled){this.style.background='rgba(99,102,241,0.14)';this.style.borderColor='rgba(99,102,241,0.4)';}"
              onmouseout="this.style.background='rgba(99,102,241,0.06)';this.style.borderColor='rgba(99,102,241,0.25)';">
              Ingest
            </button>
          </div>
        </template>
      </div>
    </div>

  </div>
</div>

<style>@keyframes spin { to { transform: rotate(360deg); } }</style>

<script>
function uploadApp() {
  return {
    queue: [], docs: [], dragging: false, uploading: false, docsLoading: false,
    handleDrop(e) { this.dragging=false; this.addFiles(e.dataTransfer.files); },
    handleFiles(files) { this.addFiles(files); },
    addFiles(files) {
      for (const f of files) {
        const ext = '.'+f.name.split('.').pop().toLowerCase();
        if (['.pdf','.docx','.txt','.md'].includes(ext))
          this.queue.push({ name:f.name, size:f.size, file:f, status:'pending' });
      }
    },
    async uploadAll() {
      this.uploading = true;
      for (const item of this.queue) {
        if (item.status !== 'pending') continue;
        item.status = 'uploading';
        try {
          const fd = new FormData();
          fd.append('file', item.file, item.name);
          const r = await fetch('/api/documents/upload', { method:'POST', body:fd });
          if (!r.ok) throw new Error();
          item.status = 'done';
        } catch { item.status = 'error'; }
      }
      this.uploading = false;
      await this.loadDocs();
      this.queue = this.queue.filter(i => i.status !== 'done');
    },
    async loadDocs() {
      this.docsLoading = true;
      try { const r = await fetch('/api/documents'); if(r.ok) this.docs = await r.json(); } catch {}
      this.docsLoading = false;
    },
    async ingest(doc) {
      doc.ingesting = true; doc.ingestError = false;
      try {
        const r = await fetch('/api/documents/ingest', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ filename: doc.name }),
        });
        if (!r.ok) throw new Error();
        const data = await r.json();
        await this.pollIngestion(doc, data.ingestion_id);
      } catch { doc.ingesting=false; doc.ingestError=true; }
    },
    async pollIngestion(doc, id) {
      for (let i=0; i<60; i++) {
        await new Promise(r => setTimeout(r, 3000));
        try {
          const r = await fetch('/api/history/ingestions');
          if (!r.ok) continue;
          const records = await r.json();
          const rec = records.find(x => x.id===id);
          if (rec?.status==='completed') { doc.ingesting=false; doc.ingested=true; return; }
          if (rec?.status==='failed')   { doc.ingesting=false; doc.ingestError=true; return; }
        } catch {}
      }
      doc.ingesting=false; doc.ingestError=true;
    },
    formatSize(b) {
      if (!b) return '—';
      if (b<1024) return b+' B';
      if (b<1048576) return (b/1024).toFixed(1)+' KB';
      return (b/1048576).toFixed(1)+' MB';
    },
    formatDate(iso) {
      if (!iso) return '';
      return new Date(iso).toLocaleDateString(undefined,{month:'short',day:'numeric'});
    },
    extColor(name) {
      const ext = (name||'').split('.').pop().toLowerCase();
      return { pdf:'color:#f87171;', docx:'color:#60a5fa;', doc:'color:#60a5fa;', txt:'color:#a3a3a3;', md:'color:#a78bfa;' }[ext] || 'color:#525256;';
    },
  };
}
</script>
