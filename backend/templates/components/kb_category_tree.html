{% if not tree %}
<p style="font-size:11.5px;color:#2a2a2e;padding:6px 8px;font-style:italic;">No categories yet</p>
{% else %}
{% for node in tree recursive %}
<div style="padding-left:{% if loop.depth > 1 %}{{ (loop.depth - 1) * 11 }}px{% else %}0{% endif %};">
  <a href="#"
     hx-get="/ui/kb/articles?category={{ node.path | urlencode }}"
     hx-target="#articles-panel"
     hx-swap="innerHTML"
     hx-indicator="#art-spinner"
     style="display:flex;align-items:center;gap:7px;padding:5px 9px;border-radius:7px;font-size:12px;color:#444448;text-decoration:none;transition:all 0.12s;"
     onmouseover="this.style.background='rgba(255,255,255,0.03)';this.style.color='#b0b0b4';"
     onmouseout="this.style.background='transparent';this.style.color='#444448';">
    {% if loop.depth == 1 %}
    <svg width="11" height="11" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" style="flex-shrink:0;opacity:0.5;">
      <path stroke-linecap="round" stroke-linejoin="round" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/>
    </svg>
    {% else %}
    <span style="width:11px;height:1px;background:#1e1e22;flex-shrink:0;display:block;"></span>
    {% endif %}
    <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">{{ node.name }}</span>
    <span style="font-size:9.5px;color:#2a2a2e;flex-shrink:0;font-weight:500;">{{ node.article_count }}</span>
  </a>
  {% if node.subcategories %}{{ loop(node.subcategories) }}{% endif %}
</div>
{% endfor %}
{% endif %}
