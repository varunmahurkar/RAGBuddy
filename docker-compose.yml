version: '3.9'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - kb_storage:/kb_storage
      - uploads:/uploads
      - ./backend:/app
    env_file:
      - backend/.env
    environment:
      - KB_STORAGE_PATH=/kb_storage
      - UPLOAD_DIR=/uploads
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  kb_storage:
  uploads:
